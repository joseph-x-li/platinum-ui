[package]
name = "platinum-ui"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true

# Reusable Leptos component library — a Mac OS Platinum-styled control set
# (buttons, dialog, collapsible, popup select, debounced button, custom
# scrollbar). Extracted from the chdkpano client so it can be shared and,
# eventually, published. The styling ships alongside as `platinum.css`.
[dependencies]
leptos = { version = "0.8", features = ["csr", "nightly"] }
# The variants! macro (support_href / support_aria_current) emits route-aware
# code, so the button component needs the router in scope.
leptos_router = { version = "0.8", features = ["nightly"] }
leptos_ui = "0.3"
tw_merge = { version = "0.1", features = ["variant"] }
gloo-timers = { version = "0.3", features = ["futures"] }
js-sys = "=0.3.98"
wasm-bindgen = "=0.2.121"
wasm-bindgen-futures = "0.4"
web-sys = { version = "=0.3.98", features = ["ResizeObserver"] }
